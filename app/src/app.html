<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0d1117" />
    <title>Ariadne. NYC Accessibility Router</title>
    <meta
      name="description"
      content="Accessible pedestrian and transit routing for New York City. Supports wheelchair, slow walker, low vision, and stroller profiles. On-device AI, no data sent to servers."
    />
    %sveltekit.head%
    <!-- Enables SharedArrayBuffer (required for WebGPU/WebLLM) on hosts that
         don't send COEP/COOP headers natively. Registers a service worker that
         re-serves all responses with those headers; reloads once on first visit. -->
    <script src="%sveltekit.assets%/coi-serviceworker.min.js"></script>
    <!-- HF Spaces embeds at /index.html; rewrite to / before SvelteKit boots -->
    <script>if(location.pathname==='/index.html')history.replaceState(null,'','/');</script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
